services:
  - type: web
    name: momentumhub-telegram-bot
    runtime: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_OWNER_IDS
        sync: false
      - key: TWITTER_CLIENT_ID
        sync: false
      - key: TWITTER_CLIENT_SECRET
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: TWITTER_CALLBACK_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT
        sync: false
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
